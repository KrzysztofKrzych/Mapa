<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">

<style>
  body { font-family: Arial; margin: 0; padding: 0; }

  #panel {
    width: 320px;
    padding: 10px;
    border: 1px solid #ccc;
    background: #fafafa;
    position: absolute;
    left: 10px;
    top: 10px;
    z-index: 1000;
  }

  #search {
    width: 100%;
    padding: 6px;
    margin-bottom: 10px;
  }

  #opcje {
    width: 100%;
    padding: 8px;
  }

  .kafelek {
    padding: 8px 10px;
    background: #dce6ff;
    border: 1px solid #8aa2ff;
    border-radius: 6px;
    margin-top: 10px;
    cursor: grab;
    width: fit-content;
    display: inline-block;
  }

  #mapContainer {
    width: 100vw;
    height: 100vh;
    overflow: scroll;
    position: relative;
  }

  #mapa {
    position: absolute;
    left: 0;
    top: 0;
    transform-origin: 0 0;
    cursor: grab;
  }

  #mapa img {
    width: 5000px;
    height: auto;
    display: block;
  }

  .pin {
    width: 32px;
    height: 32px;
    background-image: url("https://cdn-icons-png.flaticon.com/512/684/684908.png");
    background-size: contain;
    background-repeat: no-repeat;
    position: absolute;
    transform: translate(-50%, -100%);
    cursor: pointer;
  }

  #zoomPanel {
    position: absolute;
    right: 20px;
    top: 20px;
    z-index: 2000;
  }

  #zoomPanel button {
    width: 40px;
    height: 40px;
    font-size: 22px;
    margin: 3px;
  }
</style>
</head>

<body>

<div id="panel">
  <input type="text" id="search" placeholder="Szukaj urządzenia...">

  <select id="opcje">
    <option value="">-- wybierz urządzenie --</option>
    <option>B247/P189 – GWINCIARKA 1 GWINCIARKA CMARNRM-20.400</option>
    <option>B250/P192 – GWINCIARKA 2 GWINCIARKA PNEUM.CMA RNRM 20.400+STÓŁ PODZIAŁOWY</option>
  </select>

  <div id="wynik"></div>
</div>

<div id="zoomPanel">
  <button id="zoomIn">+</button>
  <button id="zoomOut">−</button>
</div>

<div id="mapContainer">
  <div id="mapa">
    <img src="Mapa.jpg" id="mapImage">
  </div>
</div>

<script>
/* Wyszukiwarka */
document.getElementById('search').addEventListener('input', function() {
  const filter = this.value.toLowerCase();
  const dropdown = document.getElementById('opcje');

  for (let i = 0; i < dropdown.options.length; i++) {
    const txt = dropdown.options[i].text.toLowerCase();
    dropdown.options[i].style.display = txt.includes(filter) ? '' : 'none';
  }
});

/* Tworzenie kafelka */
document.getElementById('opcje').addEventListener('change', function() {
  const val = this.value;
  if (!val) return;

  const kafelek = document.createElement('div');
  kafelek.className = 'kafelek';
  kafelek.textContent = val;
  kafelek.draggable = true;

  document.getElementById('wynik').appendChild(kafelek);

  this.remove(this.selectedIndex);

  kafelek.addEventListener('dragstart', () => {
    window.przeciagany = kafelek;
  });
});

/* PINY + ZAPIS */
const mapa = document.getElementById('mapa');
const dropdown = document.getElementById('opcje');

function savePins() {
  const pins = [...document.querySelectorAll('.pin')].map(pin => ({
    x: pin.style.left,
    y: pin.style.top,
    title: pin.title
  }));
  localStorage.setItem("pins", JSON.stringify(pins));
}

function loadPins() {
  const pins = JSON.parse(localStorage.getItem("pins") || "[]");
  pins.forEach(p => {
    const pin = document.createElement('div');
    pin.className = 'pin';
    pin.style.left = p.x;
    pin.style.top = p.y;
    pin.title = p.title;

    pin.onclick = () => {
      const option = document.createElement('option');
      option.textContent = pin.title;
      dropdown.appendChild(option);
      pin.remove();
      savePins();
    };

    mapa.appendChild(pin);
  });
}

loadPins();

/* Dodawanie pinów — POPRAWKA ZOOMU */
mapa.addEventListener('dragover', e => e.preventDefault());

let zoom = 1;

mapa.addEventListener('drop', e => {
  e.preventDefault();

  const rect = mapa.getBoundingClientRect();

  // ⭐ poprawka: uwzględnienie zoomu
  const x = (e.clientX - rect.left) / zoom;
  const y = (e.clientY - rect.top) / zoom;

  const pin = document.createElement('div');
  pin.className = 'pin';
  pin.style.left = x + "px";
  pin.style.top = y + "px";
  pin.title = window.przeciagany.textContent;

  pin.onclick = () => {
    const option = document.createElement('option');
    option.textContent = pin.title;
    dropdown.appendChild(option);
    pin.remove();
    savePins();
  };

  mapa.appendChild(pin);

  window.przeciagany.remove();
  window.przeciagany = null;

  savePins();
});

/* PRZESUWANIE MAPY */
const mapContainer = document.getElementById('mapContainer');
let isDragging = false;
let startScrollLeft, startScrollTop, startX, startY;

mapContainer.addEventListener('mousedown', e => {
  if (e.target.classList.contains('pin')) return;

  isDragging = true;
  startScrollLeft = mapContainer.scrollLeft;
  startScrollTop = mapContainer.scrollTop;
  startX = e.clientX;
  startY = e.clientY;
});

document.addEventListener('mouseup', () => {
  isDragging = false;
});

document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - startX;
  const dy = e.clientY - startY;
  mapContainer.scrollLeft = startScrollLeft - dx;
  mapContainer.scrollTop = startScrollTop - dy;
});

/* ZOOM */
function applyZoom() {
  mapa.style.transform = `scale(${zoom})`;
}

document.getElementById('zoomIn').onclick = () => {
  zoom += 0.1;
  applyZoom();
};

document.getElementById('zoomOut').onclick = () => {
  zoom = Math.max(0.2, zoom - 0.1);
  applyZoom();
};

mapContainer.addEventListener('wheel', e => {
  e.preventDefault();
  zoom += (e.deltaY < 0 ? 0.05 : -0.05);
  zoom = Math.max(0.2, Math.min(3, zoom));
  applyZoom();
});
</script>

</body>
</html>
