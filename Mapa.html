  /* Panel z listą */
  #panel {
    width: 320px;
    padding: 10px;
    border: 1px solid #ccc;
    background: #fafafa;
    position: fixed;
    left: 10px;
    top: 10px;
    z-index: 1000;
  }

  #search {
    width: 100%;
    padding: 6px;
    margin-bottom: 10px;
  }

  #opcje {
    width: 100%;
    padding: 8px;
  }

  .kafelek {
    padding: 8px 10px;
    background: #dce6ff;
    border: 1px solid #8aa2ff;
    border-radius: 6px;
    margin-top: 10px;
    cursor: grab;
    width: fit-content;
    display: inline-block;
  }

  /* Kontener z suwakami */
  #mapContainer {
    position: absolute;
    left: 350px;
    top: 0;
    right: 0;
    bottom: 0;
    overflow: scroll;   /* ⭐ SUWAKI */
    background: #ddd;
  }

  /* Mapa wewnątrz kontenera */
  #mapa {
    position: relative;
    width: 5000px;   /* duża grafika */
    height: auto;
  }

  #mapa img {
    width: 5000px;
    height: auto;
    display: block;
  }

  /* Piny */
  .pin {
    width: 24px;
    height: 24px;
    background: red;
    border-radius: 50%;
    border: 2px solid white;
    position: absolute;
    transform: translate(-50%, -100%);
    cursor: pointer;
  }
</style>

<script>
/* Wyszukiwarka */
document.getElementById('search').addEventListener('input', function() {
  const filter = this.value.toLowerCase();
  const dropdown = document.getElementById('opcje');

  for (let i = 0; i < dropdown.options.length; i++) {
    const txt = dropdown.options[i].text.toLowerCase();
    dropdown.options[i].style.display = txt.includes(filter) ? '' : 'none';
  }
});

/* Tworzenie kafelka po wyborze */
document.getElementById('opcje').addEventListener('change', function() {
  const val = this.value;
  if (!val) return;

  const kafelek = document.createElement('div');
  kafelek.className = 'kafelek';
  kafelek.textContent = val;
  kafelek.draggable = true;

  document.getElementById('wynik').appendChild(kafelek);

  this.remove(this.selectedIndex);

  kafelek.addEventListener('dragstart', () => {
    window.przeciagany = kafelek;
  });
});

/* Dodawanie pinów */
const mapa = document.getElementById('mapa');

mapa.addEventListener('dragover', e => e.preventDefault());

mapa.addEventListener('drop', e => {
  e.preventDefault();

  const rect = mapa.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const pin = document.createElement('div');
  pin.className = 'pin';
  pin.style.left = x + 'px';
  pin.style.top = y + 'px';

  /* opis po najechaniu */
  pin.title = window.przeciagany.textContent;

  /* klik = usuń pin */
  pin.onclick = () => pin.remove();

  mapa.appendChild(pin);

  window.przeciagany.remove();
  window.przeciagany = null;
});

/* ⭐ PRZESUWANIE TYLKO PRZY TRZYMANIU MYSZY + SUWAKI */
const mapContainer = document.getElementById('mapContainer');
let isDragging = false;
let startScrollLeft, startScrollTop, startX, startY;

mapa.addEventListener('mousedown', e => {
  // nie zaczynaj przesuwania, jeśli klikamy na pin
  if (e.target.classList.contains('pin')) return;

  isDragging = true;
  startScrollLeft = mapContainer.scrollLeft;
  startScrollTop = mapContainer.scrollTop;
  startX = e.clientX;
  startY = e.clientY;
});

document.addEventListener('mouseup', () => {
  isDragging = false;
});

document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - startX;
  const dy = e.clientY - startY;
  mapContainer.scrollLeft = startScrollLeft - dx;
  mapContainer.scrollTop = startScrollTop - dy;
});
</script>
