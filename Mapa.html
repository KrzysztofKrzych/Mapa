<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: Arial;
    background: #f0f0f0;
  }

  #mapa {
    position: relative;
    width: 1536px;
    height: 1024px;
    margin: 20px auto;
    border: 2px solid #ccc;
    background: #fff;
  }

  #mapa img {
    width: 1536px;
    height: 1024px;
    display: block;
  }

  .pin {
    width: 24px;
    height: 24px;
    background: red;
    border-radius: 50%;
    border: 2px solid white;
    position: absolute;
    transform: translate(-50%, -100%);
    cursor: pointer;
  }
</style>
</head>

<body>

<div id="mapa">
  <img src="https://krzysztofkrzych.github.io/Mapa/Mapa.jpg" id="mapImage">
</div>

<script>
const mapa = document.getElementById('mapa');

mapa.addEventListener('click', e => {
  const rect = mapa.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const pin = document.createElement('div');
  pin.className = 'pin';
  pin.style.left = x + 'px';
  pin.style.top = y + 'px';
  mapa.appendChild(pin);
});
</script>

</body>
</html>
